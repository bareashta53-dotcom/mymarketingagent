<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בוטיטו | מרכז שליטה</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="dashboard-container">

        <!-- Sidebar context -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-robot"></i>
                <h2>בוטיטו</h2>
                <span class="badge">PRO</span>
            </div>

            <div class="control-group">
                <label for="campaignId">מזהה קמפיין פעיל (ID)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-bullseye"></i>
                    <input type="text" id="campaignId" value="120240979659220156" placeholder="הזן מזהה קמפיין">
                </div>
            </div>

            <button id="refreshBtn" class="btn-primary" onclick="fetchInsights()">
                <i class="fa-solid fa-rotate-right"></i> רענן נתונים
            </button>
            <div id="statusMessage" class="status-msg"></div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>ביצועי הקמפיין</h1>
                <p class="subtitle">נתונים בזמן אמת ושליטה אוטומטית</p>
            </header>

            <!-- KPI Row -->
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-icon money"><i class="fa-solid fa-sack-dollar"></i></div>
                    <div class="kpi-data">
                        <h3>הוצאה עד כה</h3>
                        <p id="kpi-spend">₪0.00</p>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon views"><i class="fa-solid fa-eye"></i></div>
                    <div class="kpi-data">
                        <h3>חשיפות</h3>
                        <p id="kpi-impressions">0</p>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon clicks"><i class="fa-solid fa-hand-pointer"></i></div>
                    <div class="kpi-data">
                        <h3>קליקים</h3>
                        <p id="kpi-clicks">0</p>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon rate"><i class="fa-solid fa-chart-line"></i></div>
                    <div class="kpi-data">
                        <h3>אחוז הקלקה (CTR)</h3>
                        <p id="kpi-ctr">0.00%</p>
                    </div>
                </div>
            </div>

            <!-- Bot Controls -->
            <section class="controls-section">
                <h2><i class="fa-solid fa-sliders"></i> שליטה בבוטיטו</h2>

                <div class="control-card">
                    <div class="control-info">
                        <h3>אופטימיזציית תקציב יומי</h3>
                        <p>התאם את מגבלת ההוצאה היומית של הקמפיין. בוטיטו יחיל את השינוי מיידית דרך פייסבוק.</p>
                    </div>
                    <div class="control-action">
                        <div class="budget-input">
                            <span class="currency">$</span>
                            <input type="number" id="budgetInput" value="50" min="1" step="1">
                            <span class="duration">/ ליום</span>
                        </div>
                        <button id="updateBudgetBtn" class="btn-accent" onclick="updateBudget()">החל שינויים</button>
                    </div>
                </div>
                <div id="actionFeedback" class="action-feedback"></div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
